<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Desk | Padmaja Home Foods</title>
    <meta name="description" content="Billing panel for Padmaja Home Foods - Generate professional bills">

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="../favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../favicons/apple-touch-icon.png">
    <link rel="manifest" href="../favicons/site.webmanifest">
    <link rel="shortcut icon" href="../favicons/favicon.ico">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="billdesk.css">
</head>
<body>

    <!-- Header -->
    <header class="bill-header">
        <h1><i class="fas fa-receipt"></i> Bill Desk</h1>
        <p>Padmaja Home Foods - Authentic Guntur Spices & Pickles</p>
    </header>

    <!-- Customer Name -->
    <div class="customer-section">
        <label for="customerName"><i class="fas fa-user"></i> Customer Name</label>
        <input type="text" id="customerName" placeholder="Enter customer name..." autocomplete="off">
    </div>

    <!-- Products -->
    <div id="productsContainer"></div>

    <!-- Cart Summary -->
    <div class="cart-summary">
        <h3><i class="fas fa-shopping-cart"></i> Bill Summary (<span id="itemCount">0</span> items)</h3>
        <div class="cart-items" id="cartItems">
            <p style="text-align:center;color:#999;padding:20px;">No items added yet</p>
        </div>
        <div class="cart-total">
            <span>Total Amount:</span>
            <span id="cartTotal">₹0</span>
        </div>
        <button class="show-bill-btn" id="showBillBtn" onclick="showBill()" disabled>
            <i class="fas fa-file-invoice"></i> Show Bill
        </button>
    </div>

    <!-- Bill Modal -->
    <div class="bill-modal" id="billModal">
        <div class="bill-content">
            <div class="bill-header-section">
                <h2><i class="fas fa-receipt"></i> Padmaja Home Foods</h2>
                <p>Authentic Guntur Spices & Pickles</p>
                <p style="margin-top:8px;font-size:0.8rem;" id="billDate"></p>
            </div>

            <div class="bill-customer" id="billCustomer"></div>

            <div class="bill-items" id="billItems"></div>

            <div class="bill-total-section">
                <div class="bill-total-row">
                    <span>Total Amount:</span>
                    <span id="billTotalAmount">₹0</span>
                </div>
            </div>

            <div class="bill-footer">
                <p><i class="fas fa-phone"></i> +91 93813 11511</p>
                <p><i class="fas fa-envelope"></i> padmajahomefoods@gmail.com</p>
                <p>Thank you for your business! 🙏</p>
            </div>

            <div class="bill-actions">
                <button class="print-btn" onclick="printBill()">
                    <i class="fas fa-print"></i> Print
                </button>
                <button class="share-btn" onclick="shareBill()">
                    <i class="fab fa-whatsapp"></i> Share
                </button>
                <button class="close-btn" onclick="closeBill()">
                    <i class="fas fa-times"></i> Close
                </button>
            </div>
        </div>
    </div>

    <script src="billdesk.js"></script>
</body>
</html>
